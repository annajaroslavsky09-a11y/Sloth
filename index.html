<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Common Sloth Sightings Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #07111f;
        color: #f4f7fb;
      }
      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .banner {
        padding: 1.2rem 1.5rem;
        background: rgba(7, 17, 31, 0.95);
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      .banner h1 {
        margin: 0 0 0.4rem;
        font-size: 1.4rem;
      }
      .banner p {
        margin: 0;
        color: #dce8f5;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      .leaflet-popup-content-wrapper { border-radius: 14px; }
      .leaflet-popup-content img {
        width: 100%;
        max-width: 220px;
        border-radius: 10px;
        margin-top: 0.35rem;
      }
      .pink-marker {
        color: #ff4fa3;
        font-size: 22px;
        text-shadow: 0 0 6px rgba(0,0,0,0.25);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="banner">
        <h1>Common Sloth Sightings World Map</h1>
        <p>Click the pink pins to view recorded common sloth sightings, dates, times, and photos.</p>
      </section>
      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const sightings = [
        {
          name: 'Amazon Rainforest, Peru',
          lat: -3.4653,
          lng: -62.2159,
          date: '2026-06-14',
          time: '06:40',
          image: 'https://images.unsplash.com/photo-1516426122078-c23e76319801?auto=format&fit=crop&w=900&q=80',
          description: 'A juvenile common sloth spotted resting high in the canopy.'
        },
        {
          name: 'Costa Rica Cloud Forest',
          lat: 10.3,
          lng: -84.0,
          date: '2026-05-22',
          time: '08:10',
          image: 'https://images.unsplash.com/photo-1500534623283-312aade485b7?auto=format&fit=crop&w=900&q=80',
          description: 'A common sloth observed moving slowly through misty forest branches.'
        },
        {
          name: 'Madagascar Rainforest',
          lat: -18.7669,
          lng: 46.8691,
          date: '2026-04-08',
          time: '17:20',
          image: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=900&q=80',
          description: 'A common sloth sighting recorded near a protected conservation trail.'
        },
        {
          name: 'Borneo, Malaysia',
          lat: 2.5,
          lng: 112.5,
          date: '2026-03-17',
          time: '05:55',
          image: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=80',
          description: 'A common sloth photographed in dense tropical vegetation.'
        }
      ];

      const map = L.map('map', { zoomControl: true, worldCopyJump: true }).setView([20, 0], 2);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const pinkIcon = L.divIcon({
        className: 'pink-marker',
        html: '●',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      });

      sightings.forEach((spot) => {
        const marker = L.marker([spot.lat, spot.lng], { icon: pinkIcon }).addTo(map);
        marker.bindPopup(`
          <div>
            <h3>${spot.name}</h3>
            <p><strong>Date:</strong> ${spot.date}</p>
            <p><strong>Time:</strong> ${spot.time}</p>
            <p>${spot.description}</p>
            <img src="${spot.image}" alt="Common sloth sighting at ${spot.name}" />
          </div>
        `);
      });
    </script>
  </body>
</html>
